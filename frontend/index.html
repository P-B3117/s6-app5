<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Dashboard</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('messages')">Messages</button>
    <button class="tab" onclick="switchTab('commands')">Commands</button>
  </div>

  <div id="messages-panel" class="panel">
    <form class="form" id="post-form">
      <input type="text" id="topic" placeholder="Topic" required>
      <input type="text" id="message" placeholder="Message" required>
      <button type="submit">Post</button>
    </form>
    <button class="delete-all" onclick="removeAll()">Delete all</button>
    <div id="messages"></div>
  </div>

  <div id="commands-panel" class="panel hidden">
    <form class="form" id="ack-form">
      <input type="text" id="target-ip" placeholder="Target IP" required>
      <button type="submit">ACK</button>
    </form>
  </div>

  <div id="toast"></div>

  <script>
    // --- Tabs ---
    function switchTab(tab) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p => p.classList.add("hidden"));
      document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add("active");
      document.getElementById(`${tab}-panel`).classList.remove("hidden");
    }

    // --- Toast ---
    function showToast(msg, type) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.className = `toast ${type}`;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // --- Commands ---
    document.getElementById("ack-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const ip = document.getElementById("target-ip").value.trim();
      if (!ip) return;

      try {
        const res = await fetch("/control/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ip, command: "ACK" }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        showToast("ACK sent", "success");
      } catch (err) {
        showToast(`Error: ${err.message}`, "error");
      }
    });

    // --- Messages ---
    const el = document.getElementById("messages");
    const form = document.getElementById("post-form");
    const topicInput = document.getElementById("topic");
    const messageInput = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const topic = topicInput.value.trim();
      const message = messageInput.value.trim();
      if (!topic || !message) return;

      try {
        await fetch("/api/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, message }),
        });
        topicInput.value = "";
        messageInput.value = "";
        load();
      } catch (err) {
        console.error("Failed to post:", err.message);
      }
    });

    async function remove(id) {
      if (!confirm("Delete this message?")) return;
      try {
        await fetch(`/api/${id}`, { method: "DELETE" });
        load();
      } catch (err) {
        console.error("Failed to delete:", err.message);
      }
    }

    async function removeAll() {
      if (!confirm("Delete all messages?")) return;
      try {
        const res = await fetch("/api/");
        const data = await res.json();
        await Promise.all(data.map(m => fetch(`/api/${m.id}`, { method: "DELETE" }))).then(() =>
          load());
      } catch (err) {
        console.error("Failed to delete all:", err.message);
      }
    }

    async function load() {
      try {
        const res = await fetch("/api/");
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();

        if (data.length === 0) {
          el.innerHTML = '<div class="empty">No messages yet</div>';
          return;
        }

        data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

        el.innerHTML = data.map(m => `
          <div class="msg">
            <button class="delete" onclick="remove('${m.id}')">&times;</button>
            <div class="topic">${m.topic}</div>
            <div class="body">${m.message}</div>
            <div class="timestamp">${new Date(m.timestamp).toLocaleString()}</div>
          </div>
        `).join("");
      } catch (err) {
        el.innerHTML = `<div class="error">Could not reach dbaas: ${err.message}</div>`;
      }
    }

    load();
    setInterval(load, 3000);
  </script>
</body>

</html>
